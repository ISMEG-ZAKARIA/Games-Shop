<!DOCTYPE html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Checkout</title>
  <link rel="stylesheet" href="/index.css"/>
</head>
<body>
  <div class="Back-Header Header">
    <a href="index.html"><img src="./Images/FINAL-LOGO.png" class="logo" /></a>
    <div class="LINK">
      <a class="cart-button" href="cart.html" aria-label="Open cart">
        <img src="Images/online-shopping.png" class="cart-icon"/>
        <span class="cart-badge" id="cart-count">0</span>
      </a>
    </div>
  </div>

  <div class="checkout-page">
    <h1 class="checkout-title">Checkout</h1>
    
    <!-- Step 1: Personal Information -->
    <div class="checkout-step active" id="step-1">
      <div class="step-header">
        <h2>Personal Information</h2>
        <div class="step-number">1/3</div>
      </div>
      <form class="checkout-form" id="personal-form">
        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" required>
          </div>
          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Continue</button>
      </form>
    </div>

    <!-- Step 2: Address -->
    <div class="checkout-step" id="step-2">
      <div class="step-header">
        <h2>Address</h2>
        <div class="step-number">2/3</div>
      </div>
      <form class="checkout-form" id="address-form">
        <div class="form-group">
          <label for="country">Country</label>
          <select id="country" name="country" required>
            <option value="">Select Country</option>
            <option value="MA">Morocco</option>
            <option value="FR">France</option>
            <option value="US">United States</option>
            <option value="CA">Canada</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" required>
          </div>
          <div class="form-group">
            <label for="postal-code">Postal Code</label>
            <input type="text" id="postal-code" name="postalCode" required>
          </div>
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Continue</button>
      </form>
    </div>

    <!-- Step 3: Payment -->
    <div class="checkout-step" id="step-3">
      <div class="step-header">
        <h2>Payment</h2>
        <div class="step-number">3/3</div>
      </div>
      <form class="checkout-form" id="payment-form">
        <div class="payment-methods">
          <div class="payment-option">
            <input type="radio" id="visa" name="paymentMethod" value="visa" required>
            <label for="visa" class="payment-label">
              <img src="Images/visa.png" alt="Visa" class="payment-logo">
              <span>Visa</span>
            </label>
          </div>
          <div class="payment-option">
            <input type="radio" id="mastercard" name="paymentMethod" value="mastercard" required>
            <label for="mastercard" class="payment-label">
              <img src="Images/Mastercard.png" alt="Mastercard" class="payment-logo">
              <span>Mastercard</span>
            </label>
          </div>
          <div class="payment-option">
            <input type="radio" id="paypal" name="paymentMethod" value="paypal" required>
            <label for="paypal" class="payment-label">
              <img src="Images/Paypal.png" alt="PayPal" class="payment-logo">
              <span>PayPal</span>
            </label>
          </div>
        </div>
        
        <div class="card-details" id="card-details">
          <div class="form-group">
            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" name="cardNumber" placeholder="1234 5678 9012 3456" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="expiry">Expiry Date</label>
              <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
            </div>
            <div class="form-group">
              <label for="cvv">CVV</label>
              <input type="text" id="cvv" name="cvv" placeholder="123" required>
            </div>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Complete Order</button>
      </form>
    </div>

    <!-- Order Summary -->
    <div class="order-summary">
      <h3>Order Summary</h3>
      <div class="summary-items" id="checkout-items"></div>
      <div class="summary-total">
        <span>Total: </span>
        <span id="checkout-total">0,00 MAD</span>
      </div>
    </div>
  </div>

  <script src="./js/app.js"></script>
  <script src="./js/checkout.js"></script>
</body>
</html>
